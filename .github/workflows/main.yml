<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Device Diagnostics</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

button{
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
margin:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
font-size:16px;
}

</style>

</head>

<body>

<h1>📱 Device Diagnostics</h1>

<button onclick="runFullScan()">🔍 Run Full Scan</button>

<div class="grid">

<div class="card" id="device"></div>
<div class="card" id="network"></div>
<div class="card" id="battery"></div>
<div class="card" id="gps"></div>
<div class="card" id="motion"></div>
<div class="card" id="camera"></div>
<div class="card" id="microphone"></div>
<div class="card" id="speaker"></div>
<div class="card" id="cpu"></div>
<div class="card" id="gpu"></div>
<div class="card" id="speed"></div>

</div>

<script>

function runFullScan(){

testDevice()
testNetwork()
testBattery()
testGPS()
testMotion()
testCamera()
testMic()
testSpeaker()
cpuBenchmark()
gpuBenchmark()
speedTest()

}

function testDevice(){

document.getElementById("device").innerHTML =
"📱 Device<br>"+navigator.userAgent

}

function testNetwork(){

document.getElementById("network").innerHTML =
"📡 Network<br>"+(navigator.onLine ? "Online":"Offline")

}

function testBattery(){

if(navigator.getBattery){

navigator.getBattery().then(b=>{

function update(){

let percent=Math.round(b.level*100)

let state=b.charging ? "Charging ⚡":"On Battery"

document.getElementById("battery").innerHTML=
"🔋 Battery<br>"+percent+"% • "+state

}

update()

b.onlevelchange=update
b.onchargingchange=update

})

}else{

document.getElementById("battery").innerHTML=
"🔋 Battery<br>Unavailable"

}

}

function testGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

document.getElementById("gps").innerHTML=
"📍 GPS<br>"+
pos.coords.latitude+
"<br>"+
pos.coords.longitude

})

}

function testMotion(){

if(window.DeviceMotionEvent){

window.addEventListener("devicemotion",e=>{

document.getElementById("motion").innerHTML=
"🧭 Motion<br>X: "+
e.acceleration.x

})

}else{

document.getElementById("motion").innerHTML=
"🧭 Motion<br>Unavailable"

}

}

function testCamera(){

navigator.mediaDevices.getUserMedia({video:true})
.then(()=>{

document.getElementById("camera").innerHTML=
"📷 Camera<br>Accessible"

})
.catch(()=>{

document.getElementById("camera").innerHTML=
"📷 Camera<br>Blocked"

})

}

function testMic(){

navigator.mediaDevices.getUserMedia({audio:true})
.then(()=>{

document.getElementById("microphone").innerHTML=
"🎤 Microphone<br>Accessible"

})
.catch(()=>{

document.getElementById("microphone").innerHTML=
"🎤 Microphone<br>Blocked"

})

}

function testSpeaker(){

let audio=new Audio(
"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
)

audio.play()

document.getElementById("speaker").innerHTML=
"🔊 Speaker<br>Sound played"

}

function cpuBenchmark(){

let start=performance.now()

let total=0

for(let i=0;i<10000000;i++){
total+=Math.sqrt(i)
}

let end=performance.now()

document.getElementById("cpu").innerHTML=
"🧠 CPU Benchmark<br>"+Math.round(end-start)+" ms"

}

function gpuBenchmark(){

let start=performance.now()

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

for(let i=0;i<5000;i++){

ctx.fillRect(
Math.random()*300,
Math.random()*150,
5,
5
)

}

let end=performance.now()

document.getElementById("gpu").innerHTML=
"🎮 GPU Benchmark<br>"+Math.round(end-start)+" ms"

}

function speedTest(){

let start=performance.now()

fetch("https://jsonplaceholder.typicode.com/posts")
.then(r=>r.json())
.then(()=>{

let end=performance.now()

document.getElementById("speed").innerHTML=
"📶 Internet Speed<br>"+
Math.round(end-start)+" ms latency"

})

}

</script>

</body>
</html>
